events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Efficient file serving — prevents truncation during large transfers
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip compression — reduces transfer size and CDN cache footprint
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    upstream bot_backend {
        server bot1:3000 max_fails=3 fail_timeout=30s;
    }

    upstream dev_backend {
        server dev-bot:3000 max_fails=3 fail_timeout=30s;
    }

    # Trust CDN edge IPs — use real client IP from X-Forwarded-For for rate limiting
    # Bunny CDN IPs (auto-generated list — refresh from bunnycdn.com/api/system/edgeserverlist)
    include /etc/nginx/bunny-ips.conf;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Rate limiting — uses real client IP (not CDN IP) after set_real_ip_from
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # --- vseonix.com: Web Platform + Bot API / Webhook ---
    server {
        listen 443 ssl http2;
        server_name vseonix.com;

        ssl_certificate /etc/letsencrypt/live/vseonix.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vseonix.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;

        root /var/www/webapp;
        index index.html;

        # Telegram webhook
        location /webhook {
            limit_req zone=api_limit burst=20 nodelay;
            add_header Cache-Control "no-store" always;
            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check
        location /health {
            proxy_pass http://bot_backend/health;
            access_log off;
        }

        # Bull Board admin (restricted)
        location /admin/queues {
            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Auth API (no auth middleware — public endpoints)
        location /api/auth/ {
            limit_req zone=api_limit burst=10 nodelay;
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # YooKassa webhook (no auth — server-to-server)
        location /api/payment/yookassa/webhook {
            add_header Cache-Control "no-store" always;
            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Web Chat SSE streaming (disable buffering for real-time)
        location /api/web/chat/ {
            add_header Cache-Control "no-store" always;
            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE-specific: disable buffering for streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            chunked_transfer_encoding on;

            # SSE keepalive
            proxy_set_header Connection '';
        }

        # File upload API
        location /api/web/upload {
            client_max_body_size 100m;
            add_header Cache-Control "no-store" always;
            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # Serve uploaded files directly from filesystem
        location /uploads/ {
            alias /var/www/uploads/;
            add_header Cache-Control "public, max-age=86400" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Webapp API requests → proxy to bot backend
        location /api/webapp/ {
            client_max_body_size 20m;
            limit_req zone=api_limit burst=20 nodelay;
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, X-Telegram-Init-Data, Authorization' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Static assets (Vite hashed filenames — safe to cache forever)
        location /assets/ {
            add_header Strict-Transport-Security "max-age=31536000" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Cache-Control "public, immutable" always;
            expires 1y;
            try_files $uri =404;
        }

        # SPA fallback — all other routes serve index.html
        # CDN caches for 60s (s-maxage), browser always revalidates (max-age=0)
        location / {
            add_header Cache-Control "public, max-age=0, s-maxage=60" always;
            try_files $uri $uri/ /index.html;
        }
    }

    # --- webapp.vseonix.com: Telegram WebApp ---
    server {
        listen 443 ssl http2;
        server_name webapp.vseonix.com;

        ssl_certificate /etc/letsencrypt/live/vseonix.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vseonix.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header Strict-Transport-Security "max-age=31536000" always;
        # DO NOT set X-Frame-Options here — it's deprecated and Chrome/Firefox ignore ALLOW-FROM.
        # Use Content-Security-Policy frame-ancestors instead to allow Telegram to embed this webapp.
        add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://*.telegram.org tg:" always;
        add_header X-Content-Type-Options "nosniff" always;

        root /var/www/webapp;
        index index.html;

        # NOTE: Do NOT use server-level add_header here.
        # nginx drops ALL server-level add_header when a location has its own add_header.
        # Instead, repeat headers in every location block.

        # Auth API (QR login, Google OAuth, etc.)
        location /api/auth/ {
            limit_req zone=api_limit burst=10 nodelay;
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Web Chat SSE streaming (disable buffering for real-time)
        location /api/web/chat/ {
            add_header Cache-Control "no-store" always;
            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE-specific: disable buffering for streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            chunked_transfer_encoding on;

            # SSE keepalive
            proxy_set_header Connection '';
        }

        # File upload API
        location /api/web/upload {
            client_max_body_size 100m;
            add_header Cache-Control "no-store" always;
            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # Serve uploaded files directly from filesystem
        location /uploads/ {
            alias /var/www/uploads/;
            add_header Cache-Control "public, max-age=86400" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # API requests → proxy to bot backend
        location /api/webapp/ {
            client_max_body_size 20m;
            limit_req zone=api_limit burst=20 nodelay;
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;

            # Handle CORS preflight requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, X-Telegram-Init-Data, Authorization' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Static assets (Vite hashed filenames — safe to cache forever)
        location /assets/ {
            add_header Strict-Transport-Security "max-age=31536000" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Cache-Control "public, immutable" always;
            expires 1y;
            try_files $uri =404;
        }

        # SPA fallback — all other routes serve index.html
        # CDN caches for 60s (s-maxage), browser always revalidates (max-age=0)
        location / {
            add_header Cache-Control "public, max-age=0, s-maxage=60" always;
            try_files $uri $uri/ /index.html;
        }
    }

