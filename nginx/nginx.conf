            alias /var/www/uploads/;
            add_header Cache-Control "public, max-age=86400" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location /api/webapp/ {
            client_max_body_size 20m;
            limit_req zone=api_limit burst=20 nodelay;
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /assets/ {
            add_header Cache-Control "public, immutable" always;
            expires 1y;
            try_files $uri =404;
        }

        location / {
            add_header Cache-Control "public, max-age=0, s-maxage=60" always;
            try_files $uri $uri/ /index.html;
        }
    }

    # --- webapp.vseonix.com HTTP: CDN origin pull (no redirect) ---
    # CDN pulls from origin via HTTP — do NOT redirect to HTTPS here.
    server {
        listen 80;
        server_name webapp.vseonix.com;

        root /var/www/webapp;
        index index.html;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /api/auth/ {
            limit_req zone=api_limit burst=10 nodelay;
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/web/chat/ {
            add_header Cache-Control "no-store" always;
            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            chunked_transfer_encoding on;
            proxy_set_header Connection '';
        }

        location /api/web/upload {
            client_max_body_size 100m;
            add_header Cache-Control "no-store" always;
            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Serve uploaded files directly from filesystem
        location /uploads/ {
            alias /var/www/uploads/;
            add_header Cache-Control "public, max-age=86400" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location /api/webapp/ {
            client_max_body_size 20m;
            limit_req zone=api_limit burst=20 nodelay;
            add_header Cache-Control "no-store" always;
            add_header Pragma "no-cache" always;
            proxy_pass http://bot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /assets/ {
            add_header Cache-Control "public, immutable" always;
            expires 1y;
            try_files $uri =404;
        }

        location / {
            add_header Cache-Control "public, max-age=0, s-maxage=60" always;
            try_files $uri $uri/ /index.html;
        }
    }

    # --- HTTP to HTTPS redirect (other domains only) ---
    server {
        listen 80;
        server_name db.vseonix.com dev.webapp.vseonix.com admin.vseonix.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }
}
